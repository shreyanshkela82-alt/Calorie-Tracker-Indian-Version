<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalorieTracker Login</title>
    <link rel="stylesheet" href="loginpage.css" />
  </head>
  <body>
    <!-- MAIN WRAPPER (FULL SCREEN FIX) -->
    <div class="page">
      <main class="container">
        <!-- LEFT SIDE -->
        <section class="left-section">
          <!-- decorative shapes -->
          <div class="leaf leaf-left"></div>
          <div class="leaf leaf-right"></div>

          <!-- icons (tools like image) -->
          <div class="tool tool1">📊</div>
          <div class="tool tool2">🏋️</div>
          <div class="tool tool3">🥗</div>
          <div class="tool tool4">🍎</div>

          <!-- content -->
          <div class="content-wrapper">
            <div class="logo-row">
              <div class="logo-circle">
                <img src="logo.png" alt="logo" />
              </div>
              <h1>CalorieTracker</h1>
            </div>

            <h2>Track. Eat. Improve.</h2>
            <p>
              Manage your daily calories, stay fit, and reach your goals with
              ease.
            </p>
          </div>
        </section>

        <!-- RIGHT SIDE -->
        <section class="right-section">
          <!-- top icon -->
          <div class="top-food-icon">🍲</div>

          <!-- sparkle -->
          <div class="sparkle">✦</div>

          <!-- login card -->
          <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to continue your journey</p>

            <form id="loginForm">
              <div class="input-group">
                <label>Email</label>
                <input
                  type="email"
                  id="email"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <div class="input-group">
                <label>Password</label>
                <input
                  type="password"
                  id="password"
                  placeholder="Enter your password"
                  required
                />
              </div>

              <button type="submit">Login</button>
            </form>

            <p class="signup-text">
              Don’t have an account?
              <a href="register.html">Create your account</a>
            </p>
          </div>
        </section>
      </main>
    </div>
    <script src="loginpage.js"></script>
  </body>
</html>

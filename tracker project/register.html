<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="loginpage.css" />
</head>
<body>

  <div class="page">
    <main class="container">

      <!-- LEFT SIDE (same as login) -->
      <section class="left-section">

        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>

        <div class="tool tool1">📊</div>
        <div class="tool tool2">🏋️</div>
        <div class="tool tool3">🥗</div>
        <div class="tool tool4">🍎</div>

        <div class="content-wrapper">
          <div class="logo-row">
            <div class="logo-circle">☘</div>
            <h1>CalorieTracker</h1>
          </div>

          <h2>Track. Eat. Improve.</h2>
          <p>
            Start your journey today and take control of your health.
          </p>
        </div>
      </section>

      <!-- RIGHT SIDE -->
      <section class="right-section">

        <div class="top-food-icon">🍲</div>
        <div class="sparkle">✦</div>

        <div class="login-card">
          <h2>Create Account</h2>
          <p class="subtitle">Sign up to get started</p>

          <form>
            <div class="input-group">
              <label>Name</label>
              <input type="text" placeholder="Enter your name" required />
            </div>

            <div class="input-group">
              <label>Email</label>
              <input type="email" placeholder="Enter your email" required />
            </div>

            <div class="input-group">
              <label>Password</label>
              <input type="password" placeholder="Create password" required />
            </div>

            <div class="input-group">
              <label>Confirm Password</label>
              <input type="password" placeholder="Confirm password" required />
            </div>

            <button type="submit">Create Account</button>
          </form>

          <p class="signup-text">
            Already have an account?
            <a href="loginpage.html">Login</a>
          </p>
        </div>

      </section>

    </main>
  </div>

</body>
</html>
